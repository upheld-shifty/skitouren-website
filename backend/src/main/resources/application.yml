spring:
  application:
    name: skitouren-backend
  threads:
    virtual:
      enabled: true  # Java 21 virtual threads for free concurrency
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skitouren}
    username: ${SPRING_DATASOURCE_USERNAME:skitouren}
    password: ${SPRING_DATASOURCE_PASSWORD:skitouren}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  auth:
    username: ${ADMIN_USERNAME:admin}
    password-hash: ${ADMIN_PASSWORD_HASH}
    jwt-secret: ${JWT_SECRET}
    jwt-expiry-hours: 24
  storage:
    root: ${STORAGE_ROOT:/tmp/skitouren/storage}
    max-photo-size-mb: 20
    max-gpx-size-mb: 5
